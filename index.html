<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Google-accounts</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box, .prank-box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .google-logo { height: 24px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; }
        input { width: 100%; padding: 13px 15px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 20px; }
        
        /* Prank styling */
        .prank-box { display: none; background: #ffeeee; border: 2px solid #ff0000; }
        .emoji { font-size: 80px; margin-bottom: 20px; }
        .troll-text { font-size: 28px; font-weight: bold; color: #ff0000; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo" alt="Google">
        <h1>Inloggen</h1>
        <p>Gebruik je Google-account</p>
        <input type="email" id="email" placeholder="E-mailadres" required>
        <input type="password" id="pass" placeholder="Wachtwoord" required>
        <button onclick="startPrank()">Volgende</button>
    </div>

    <div id="prankPage" class="prank-box">
        <div class="emoji">🤡</div>
        <div class="troll-text">sukkel</div>
        <p>Echt serieus? Je vult zomaar je wachtwoord in?</p>
        <p><b>bedankt voor je inloggegevens😂</b></p>
        <p style="font-size: 12px; color: #666;">(Geen zorgen, dit was een test. Je wachtwoord is nergens opgeslagen... deze keer.)</p>
        <button onclick="location.reload()" style="background: #333;">Terug naar start</button>
    </div>

    <script>
        function startPrank() {
            var email = document.getElementById('email').value;
            var pass = document.getElementById('pass').value;

            if(email === "" || pass === "") {
                alert("Vul wel even wat in hè!");
                return;
            }

            // Verberg de login en laat de grap zien
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('prankPage').style.display = 'block';
            
            // Speel een geluidje af als je echt gemeen wilt zijn (optioneel)
            console.log("Slachtoffer gevangen!");
        }
    </script>
</body>
</html>
